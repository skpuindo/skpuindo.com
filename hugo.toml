# ================================
# Theme Settings
# ================================

[params]
  [params.neso]
    #time_format                        = "2006 January 02"
    time_format                        = "2006.01.02"
    show_breadcrumbs                   = true
    ext_link_indicator                 = true
    ext_link_no_opener_referrer        = true
    ext_link_new_window                = true
    [params.neso.branding]
      logo_text                        = "S.K. Puindo"
      hide_logo_text                   = false
      logo_image                       = "img/logo.svg"
      logo_image_dark                  = "img/logo_dark.svg"
      og_image                         = "img/metadata/ogimg.png"
      favicon_ico                      = "favicon.ico"
      favicon_svg                      = "img/metadata/favicon.svg"
      apple_touch_icon                 = "img/metadata/apple-touch-icon.png"
      pwa_short_title                  = "S.K. Puindo"
      pwa_theme_color_light            = "#f5f6f7"
      pwa_theme_color_dark             = "#000000"
      pwa_icon_svg                     = "img/metadata/pwa-icon.svg"
      pwa_icon_192                     = "img/metadata/pwa-icon-192.png"
      pwa_icon_512                     = "img/metadata/pwa-icon-512.png"
      pwa_icon_maskable_svg            = "img/metadata/pwa-icon-maskable.svg"
      pwa_icon_maskable_192            = "img/metadata/pwa-icon-maskable-192.png"
      pwa_icon_maskable_512            = "img/metadata/pwa-icon-maskable-512.png"
    [params.neso.social]
      [[params.neso.social.links]]
        name                           = "BlueSky"
        url                            = "https://bsky.app/profile/skpuindo.com"
      [[params.neso.social.links]]
        name                           = "Mastodon"
        url                            = "https://mastodon.sdf.org/@skpuindo"
    [params.neso.home]
      display_mode                     = "profile"
      [params.neso.home.list]
        featured_entries_limit         = 2
      [params.neso.home.profile]
        avatar_image                   = "img/jessdunnthis_spider.png"
        avatar_image_alt_text          = "S.K. Puindo's profile photo"
        [[params.neso.home.profile.link_btns]]
          label                        = "Posts"
          url                          = "posts/"
        [[params.neso.home.profile.link_btns]]
          label                        = "Books"
          url                          = "books/"
    [params.neso.list]
      prominent_first_entry            = true
      disable_responsive_cover_image   = false
      hide_summary                     = false
    [params.neso.page]
      ext_link_indicator               = true
      ext_link_no_opener_referrer      = true
      ext_link_new_window              = true
      show_breadcrumbs                 = true
      show_prev_next                   = true
      show_share                       = true
      share_providers                  = ["bluesky", "reddit", "x", "facebook", "linkedin", "reddit"]
    [params.neso.seo]
      site_description                 = "Dark epic fantasy author"
      site_keywords                    = ["epic fantasy", "dark epic fantasy", "writing", "story structure", "outlining", "S. K. Puindo"]
      site_author                      = ["S.K. Puindo"]

    [params.neso.search]
      input_placeholder                = "Title, keywords..."
