baseURL = 'https://skpuindo.com/'
locale = 'en-us'
title = 'S.K. Puindo, epic fantasy author'
copyright = "© S.K. Puindo"
theme = "hugo-neso"

enableRobotsTXT                = true

mainSections                   = ["posts", "books"]
pluralizeListTitles            = false

timeZone                       = "US/Mountain"
languageCode                   = "en-us"
defaultContentLanguage         = "en"
defaultContentLanguageInSubdir = false

[outputs]
  home                         = ["html", "json"]
  section                      = ["html"]

[minify]
  minifyOutput = true

[imaging]
  resampleFilter = 'Lanczos'

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[pagination]
  # set a small number to demo pagination
  pagerSize = 6

[taxonomies]
  tag        = "tags"
  category   = "categories"
  #series     = "series"

# --------------------------------
# i18n & Language-Specific Theme Settings
# --------------------------------

[languages]
  [languages.en]
    disabled          = false
    languageCode      = "en-us"
    languageDirection = "ltr"
    languageName      = "English"
    hasCJKLanguage    = false
    title             = "S.K. Puindo"
    weight            = 1

# --------------------------------
# Site Navigation
# --------------------------------

[languages.en.menus]
  [[languages.en.menus.main]]
    identifier = "books"
    name       = "Books"
    pageRef    = "/books"
    weight     = 5
  [[languages.en.menus.main]]
    identifier = "posts"
    name       = "Posts"
    pageRef    = "/posts"
    weight     = 10
  [[languages.en.menus.main]]
    identifier = "tags"
    name       = "Tags"
    pageRef    = "/tags"
    weight     = 20
#  [[languages.en.menus.main]]
#    identifier = "series"
#    name       = "Series"
#    pageRef    = "/series"
#    weight     = 30
  [[languages.en.menus.main]]
    identifier = "archives"
    name       = "Archives"
    pageRef    = "/archives"
    weight     = 40
  [[languages.en.menus.main]]
    identifier = "search"
    name       = "Search"
    pageRef    = "/search"
    weight     = 50

